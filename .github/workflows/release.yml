# Release workflow: builds a signed release APK on version tags (v*) and
# attaches it to a GitHub Release.
#
# Required repository secrets:
#   SIGNING_KEYSTORE_B64     - base64-encoded release keystore (.jks)
#   SIGNING_STORE_PASSWORD   - keystore password
#   SIGNING_KEY_ALIAS        - key alias inside the keystore
#   SIGNING_KEY_PASSWORD     - password for the key alias

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :packages:app:assembleRelease

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: packages/app/build/outputs/apk/release/*.apk
